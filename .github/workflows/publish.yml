name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag (e.g. beta, latest)'
        required: false
        default: 'beta'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Build packages (dependency order)
        run: |
          bun run --cwd packages/core build
          bun run --cwd packages/input build
          bun run --cwd packages/renderer build
          bun run --cwd packages/physics build
          bun run --cwd packages/react build

      - name: Publish packages
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          TAG=${{ github.event.inputs.tag || 'beta' }}
          bun publish --cwd packages/core    --access public --tag $TAG
          bun publish --cwd packages/input   --access public --tag $TAG
          bun publish --cwd packages/renderer --access public --tag $TAG
          bun publish --cwd packages/physics  --access public --tag $TAG
          bun publish --cwd packages/react    --access public --tag $TAG
