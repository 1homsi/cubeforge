name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Debug auth
        run: |
          echo "=== global npmrc ==="
          cat ~/.npmrc || echo "none"
          echo "=== local npmrc ==="
          cat packages/react/.npmrc || echo "none"
          echo "=== npm whoami ==="
          npm whoami || echo "not logged in"

      - name: Publish cubeforge
        run: cd packages/react && npm publish --access public

      - name: Publish create-cubeforge-game
        run: cd packages/create-cubeforge-game && npm publish --access public
