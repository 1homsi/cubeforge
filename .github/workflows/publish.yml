name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Stamp version from release tag onto both packages
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          node -e "
            const fs = require('fs');
            ['packages/react/package.json', 'packages/create-cubeforge-game/package.json'].forEach(p => {
              const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
              pkg.version = '${VERSION}';
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
            });
            console.log('Stamped version ${VERSION}');
          "

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Publish cubeforge
        run: cd packages/react && npm publish --provenance --access public --no-git-checks

      - name: Publish create-cubeforge-game
        run: cd packages/create-cubeforge-game && npm publish --provenance --access public --no-git-checks
