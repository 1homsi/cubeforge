name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Packed package smoke test
        run: node scripts/publish-packages.mjs smoke

      - name: Prepare package manifests
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          VERSION="$VERSION" node scripts/publish-packages.mjs prepare

      - name: Publish packages
        run: |
          while IFS= read -r package_dir; do
            echo "Publishing ${package_dir}"
            (cd "${package_dir}" && npx --yes npm@latest publish --provenance --access public --no-git-checks)
          done < <(node scripts/publish-packages.mjs list-paths)
