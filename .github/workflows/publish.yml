name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to latest
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Prepare cubeforge package.json for publish
        run: |
          cd packages/react
          npm pkg delete dependencies
          npm pkg set main="./dist/index.js"
          npm pkg set types="./dist/index.d.ts"
          npm pkg set 'exports["."].import'="./dist/index.js"
          npm pkg set 'exports["."].types'="./dist/index.d.ts"

      - name: Publish cubeforge
        run: cd packages/react && npm publish --access public

      - name: Publish create-cubeforge-game
        run: cd packages/create-cubeforge-game && npm publish --access public
