name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to latest
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Stamp version from release tag onto both packages
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          node -e "
            const fs = require('fs');
            ['packages/react/package.json', 'packages/create-cubeforge-game/package.json'].forEach(p => {
              const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
              pkg.version = '${VERSION}';
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
            });
            console.log('Stamped version ${VERSION} onto both packages');
          "

      - name: Prepare cubeforge package.json for publish
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('packages/react/package.json', 'utf8'));
            delete pkg.dependencies;
            pkg.main = './dist/index.js';
            pkg.types = './dist/index.d.ts';
            pkg.exports = { '.': { import: './dist/index.js', types: './dist/index.d.ts' } };
            fs.writeFileSync('packages/react/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish cubeforge
        run: cd packages/react && npm publish --access public

      - name: Publish create-cubeforge-game
        run: cd packages/create-cubeforge-game && npm publish --access public
