name: Publish to npm

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    if: contains(github.event.head_commit.message, '--bump') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Build packages (dependency order)
        run: |
          bun run --cwd packages/core build
          bun run --cwd packages/input build
          bun run --cwd packages/renderer build
          bun run --cwd packages/physics build
          bun run --cwd packages/react build

      - name: Publish packages
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          bun publish --cwd packages/core     --access public
          bun publish --cwd packages/input    --access public
          bun publish --cwd packages/renderer --access public
          bun publish --cwd packages/physics  --access public
          bun publish --cwd packages/react    --access public

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./packages/react/package.json').version")
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "Release v${VERSION} — see [CHANGELOG](https://github.com/1homsi/cubeforge/commits/main) for details."
